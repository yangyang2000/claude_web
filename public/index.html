<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #1a1a1a; color: #abb2bf;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ── */
    #header {
      padding: 6px 12px; background: #111; font: 13px/1 monospace;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid #2a2a2a; flex-shrink: 0; z-index: 10;
    }
    #header .brand { color: #e06c75; font-weight: bold; }
    #status { font-size: 12px; }
    #status.connected { color: #98c379; }
    #status.disconnected { color: #e06c75; }
    #session-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; display: none; }
    #session-badge.resumed {
      display: inline; background: rgba(97,175,239,.15);
      color: #61afef; border: 1px solid rgba(97,175,239,.3);
    }
    #user-avatar { width: 22px; height: 22px; border-radius: 50%; display: none; }

    .btn {
      font: 11px/1 monospace; background: none; border: 1px solid #333;
      border-radius: 4px; padding: 4px 9px; cursor: pointer; color: #555; white-space: nowrap;
    }
    .btn:hover { color: #abb2bf; border-color: #555; }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn.accent { color: #98c379; border-color: rgba(152,195,121,.4); }
    .btn.accent:hover { background: rgba(152,195,121,.1); }
    .btn.danger { color: #e06c75; border-color: rgba(224,108,117,.4); }
    .btn.danger:hover { background: rgba(224,108,117,.1); }
    .btn.muted { color: #444; border-color: #2a2a2a; }
    .btn.muted:hover { color: #abb2bf; border-color: #555; }
    .btn.active-btn { color: #61afef; border-color: rgba(97,175,239,.5); background: rgba(97,175,239,.08); }

    /* ── Layout ── */
    #workspace { flex: 1; display: flex; overflow: hidden; }

    /* ── Management panel ── */
    #panel {
      width: 300px; min-width: 300px; flex-shrink: 0;
      background: #0d0d0d; border-right: 1px solid #222;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #panel.collapsed { display: none; }

    /* Panel section headers */
    .section-head {
      padding: 10px 12px 7px; display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .section-label {
      font: bold 10px/1 monospace; color: #444;
      text-transform: uppercase; letter-spacing: .08em; flex: 1;
    }
    .section-divider { border-top: 1px solid #181818; flex-shrink: 0; }

    /* ── Projects ── */
    #projects-list { overflow-y: auto; max-height: 210px; }
    #projects-list::-webkit-scrollbar { width: 3px; }
    #projects-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .project-item {
      padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #111;
      border-left: 2px solid transparent; transition: background .1s;
      display: flex; align-items: center; gap: 8px;
    }
    .project-item:hover { background: #131313; }
    .project-item.active-project { background: rgba(97,175,239,.05); border-left-color: #61afef; }
    .project-item.filtered { background: rgba(152,195,121,.04); border-left-color: #98c379; }
    .project-item-info { flex: 1; min-width: 0; }
    .project-item-name {
      font: bold 12px/1.3 monospace; color: #abb2bf;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .project-item.active-project .project-item-name { color: #61afef; }
    .project-item-path { font: 10px/1 monospace; color: #2e2e2e; margin-top: 2px; }
    .project-item-age { font: 10px/1 monospace; color: #2e2e2e; flex-shrink: 0; }
    .project-shared-badge {
      font: 9px/1 monospace; color: #c678dd; background: rgba(198,120,221,.1);
      border: 1px solid rgba(198,120,221,.25); border-radius: 3px;
      padding: 1px 4px; flex-shrink: 0;
    }
    #no-projects { padding: 14px 12px; font: 11px/1.5 monospace; color: #2e2e2e; }

    /* ── Conversations ── */
    #conversations-section {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    #search-wrap { padding: 6px 10px 4px; flex-shrink: 0; }
    #search-input {
      width: 100%; background: #111; border: 1px solid #1e1e1e;
      border-radius: 4px; padding: 5px 8px;
      font: 12px/1 monospace; color: #abb2bf; outline: none;
    }
    #search-input:focus { border-color: #333; }
    #search-input::placeholder { color: #2a2a2a; }

    #sessions-list { flex: 1; overflow-y: auto; }
    #sessions-list::-webkit-scrollbar { width: 3px; }
    #sessions-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .session-item {
      padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #111;
      display: flex; gap: 6px; align-items: flex-start; transition: background .1s;
      border-left: 2px solid transparent;
    }
    .session-item:hover { background: #111; }
    .session-item.active-session { background: rgba(97,175,239,.05); border-left-color: #61afef; }
    .session-meta { flex: 1; min-width: 0; }
    .session-title {
      font: bold 12px/1.3 monospace; color: #abb2bf;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-item.active-session .session-title { color: #61afef; }
    .session-byline { font: 10px/1 monospace; color: #444; margin: 3px 0 2px; display: flex; align-items: center; gap: 6px; }
    .session-project-tag {
      font: 10px/1 monospace; color: #61afef; background: rgba(97,175,239,.1);
      border: 1px solid rgba(97,175,239,.2); border-radius: 3px;
      padding: 1px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;
    }
    .session-snippet {
      font: 11px/1.4 monospace; color: #333;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; margin-top: 2px;
    }
    .session-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity .1s; }
    .session-item:hover .session-actions { opacity: 1; }
    .session-action-btn {
      background: none; border: none; cursor: pointer; padding: 1px 3px;
      font-size: 12px; color: #333; line-height: 1; transition: color .1s;
    }
    .session-action-btn:hover.rename { color: #61afef; }
    .session-action-btn:hover.delete { color: #e06c75; }
    .session-title-input {
      width: 100%; background: #1a1a1a; border: 1px solid #444;
      border-radius: 3px; padding: 1px 4px;
      font: bold 12px/1.3 monospace; color: #abb2bf; outline: none;
    }

    #no-sessions {
      padding: 20px 14px; text-align: center;
      font: 11px/1.8 monospace; color: #2a2a2a; display: none;
    }

    #panel-footer {
      padding: 7px 10px; border-top: 1px solid #181818;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }

    /* ── Project picker modal ── */
    #project-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    #project-modal-box {
      background: #111; border: 1px solid #2a2a2a; border-radius: 8px;
      width: 460px; max-width: 90vw; max-height: 70vh; display: flex; flex-direction: column;
    }
    #project-modal-header {
      padding: 12px 14px 10px; border-bottom: 1px solid #222;
      display: flex; align-items: center; gap: 8px;
    }
    #project-modal-header h3 { font: bold 13px/1 monospace; color: #abb2bf; flex: 1; }
    #project-name-input {
      margin: 8px 12px 4px; background: #1a1a1a; border: 1px solid #333;
      border-radius: 4px; padding: 7px 10px;
      font: 13px/1 monospace; color: #abb2bf; outline: none;
    }
    #project-name-input:focus { border-color: #555; }
    #project-name-input::placeholder { color: #3a3a3a; }
    #project-dir-list { flex: 1; overflow-y: auto; padding: 2px 0; min-height: 40px; }
    #project-dir-list::-webkit-scrollbar { width: 4px; }
    #project-dir-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .project-dir-item {
      padding: 8px 14px; cursor: pointer; border-bottom: 1px solid #0d0d0d;
      border-left: 2px solid transparent; transition: background .1s;
    }
    .project-dir-item:hover { background: #161616; }
    .project-dir-item.selected { background: rgba(97,175,239,.07); border-left-color: #61afef; }
    .project-dir-item .dir-name { font: bold 12px/1.3 monospace; color: #abb2bf; display: flex; align-items: center; gap: 6px; }
    .project-dir-item .dir-path { font: 10px/1 monospace; color: #3a3a3a; margin-top: 3px; }
    .dir-shared-badge {
      font: 9px/1 monospace; color: #c678dd; background: rgba(198,120,221,.1);
      border: 1px solid rgba(198,120,221,.25); border-radius: 3px; padding: 1px 4px;
    }
    #project-no-results { padding: 16px 14px; font: 12px/1 monospace; color: #333; }
    #project-modal-footer {
      padding: 8px 12px; border-top: 1px solid #222;
      display: flex; align-items: center; gap: 8px;
    }
    #project-modal-hint { flex: 1; font: 11px/1 monospace; color: #444; }

    /* ── Terminal ── */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #terminal-container { flex: 1; padding: 8px; overflow: hidden; }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }

    /* ── File tree panel ── */
    #file-panel {
      width: 240px; min-width: 240px; flex-shrink: 0;
      background: #0d0d0d; border-left: 1px solid #222;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #file-panel.collapsed { display: none; }
    #file-panel-head {
      padding: 10px 10px 7px; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    #file-tree { flex: 1; overflow-y: auto; padding: 0 0 8px; }
    #file-tree::-webkit-scrollbar { width: 3px; }
    #file-tree::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .tree-node { user-select: none; }
    .tree-row {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px; cursor: pointer; white-space: nowrap;
      overflow: hidden; font: 11px/1.4 monospace; color: #555;
      border-left: 2px solid transparent;
    }
    .tree-row:hover { background: #111; color: #abb2bf; }
    .tree-row.tree-file:hover { border-left-color: #61afef; }
    .tree-icon { flex-shrink: 0; font-size: 10px; color: #333; width: 12px; text-align: center; }
    .tree-name { overflow: hidden; text-overflow: ellipsis; }
    .tree-name.dotfile { color: #333; }
    .tree-row:hover .tree-name.dotfile { color: #666; }
    .tree-children { padding-left: 12px; }
    .tree-loading { padding: 3px 8px 3px 20px; font: 10px/1 monospace; color: #2e2e2e; }
    #file-tree-empty { padding: 14px 12px; font: 11px/1.5 monospace; color: #2e2e2e; }

    /* ── File content pane (split below tree) ── */
    #file-content-pane {
      display: none; flex-direction: column; flex: 1; min-height: 0;
      border-top: 1px solid #222;
    }
    #file-content-pane.open { display: flex; }
    #file-tree.split { display: none; }
    #workspace.file-expanded #panel { display: none; }
    #workspace.file-expanded #main  { display: none; }
    #workspace.file-expanded #file-panel { width: 100%; min-width: 0; }
    #file-content-header {
      padding: 6px 10px; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      border-bottom: 1px solid #1a1a1a;
    }
    #file-content-name { flex: 1; font: 10px/1 monospace; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-content-warning { font: 9px/1 monospace; color: #d19a66; flex-shrink: 0; }
    #file-content-body {
      flex: 1; overflow: auto; padding: 10px;
      font: 11px/1.6 "Cascadia Code", "Fira Code", monospace;
      color: #abb2bf; white-space: pre-wrap; word-break: break-all; tab-size: 2;
    }
    #file-content-body::-webkit-scrollbar { width: 3px; height: 3px; }
    #file-content-body::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    /* ── Notebook renderer ── */
    #file-content-body.notebook { white-space: normal; word-break: normal; padding: 12px 14px; }
    .nb-cell { margin-bottom: 12px; border-radius: 4px; overflow: hidden; }
    .nb-cell-in { display: flex; align-items: stretch; }
    .nb-gutter { font: 9px/1 monospace; color: #3e4452; padding: 6px 6px 6px 0; min-width: 46px; text-align: right; flex-shrink: 0; }
    .nb-source {
      flex: 1; background: #23272e; border: 1px solid #2a2e36; border-radius: 3px;
      padding: 6px 8px; font: 11px/1.6 "Cascadia Code","Fira Code",monospace;
      color: #abb2bf; white-space: pre-wrap; word-break: break-all; tab-size: 2; overflow-x: auto;
    }
    .nb-cell-markdown .nb-source {
      background: transparent; border-color: transparent;
      color: #abb2bf; font: 13px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .nb-cell-markdown .nb-source h1,
    .nb-cell-markdown .nb-source h2,
    .nb-cell-markdown .nb-source h3 { color: #e5c07b; font-weight: bold; margin: .4em 0 .2em; }
    .nb-cell-markdown .nb-source h1 { font-size: 1.4em; }
    .nb-cell-markdown .nb-source h2 { font-size: 1.2em; }
    .nb-cell-markdown .nb-source h3 { font-size: 1.05em; }
    .nb-cell-markdown .nb-source p { margin: .3em 0; }
    .nb-cell-markdown .nb-source ul,
    .nb-cell-markdown .nb-source ol { padding-left: 1.4em; margin: .3em 0; }
    .nb-cell-markdown .nb-source code {
      font: 11px/1.5 "Cascadia Code","Fira Code",monospace;
      background: #23272e; border-radius: 3px; padding: 1px 4px; color: #98c379;
    }
    .nb-cell-markdown .nb-source pre {
      background: #23272e; border-radius: 3px; padding: 8px; overflow-x: auto; margin: .4em 0;
    }
    .nb-cell-markdown .nb-source pre code { background: none; padding: 0; }
    .nb-cell-markdown .nb-source a { color: #61afef; }
    .nb-cell-markdown .nb-source strong { color: #e5c07b; }
    .nb-cell-markdown .nb-source em { color: #c678dd; }
    .nb-cell-markdown .nb-source blockquote {
      border-left: 3px solid #3e4452; padding-left: 8px; margin: .3em 0; color: #5c6370;
    }
    .nb-cell-markdown .nb-source hr { border: none; border-top: 1px solid #2a2e36; margin: .6em 0; }
    .nb-outputs { margin-left: 46px; }
    .nb-output { padding: 4px 0 2px; }
    .nb-output-text {
      font: 11px/1.6 "Cascadia Code","Fira Code",monospace;
      color: #98c379; white-space: pre-wrap; word-break: break-all;
    }
    .nb-output-text.stderr { color: #e06c75; }
    .nb-output-result {
      font: 11px/1.6 "Cascadia Code","Fira Code",monospace;
      color: #d19a66; white-space: pre-wrap; word-break: break-all;
    }
    .nb-output-error {
      font: 11px/1.6 "Cascadia Code","Fira Code",monospace;
      color: #e06c75; white-space: pre-wrap; word-break: break-all;
    }
    .nb-output img { max-width: 100%; border-radius: 3px; }

    /* ── Simple view ── */
    #simple-view {
      display: none; flex: 1; flex-direction: column; min-height: 0;
    }
    #main.simple-mode #terminal-container { display: none; }
    #main.simple-mode #simple-view { display: flex; }
    #simple-chat {
      flex: 1; overflow-y: auto;
      padding: 10px max(12px, calc(50% - 400px));
      display: flex; flex-direction: column; gap: 6px;
    }
    #simple-chat::-webkit-scrollbar { width: 4px; }
    #simple-chat::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .chat-user {
      align-self: flex-end;
      background: rgba(97,175,239,.12); border: 1px solid rgba(97,175,239,.25);
      border-radius: 12px 12px 2px 12px; padding: 7px 12px;
      font: 13px/1.4 monospace; color: #abb2bf;
      max-width: 85%; word-break: break-word; white-space: pre-wrap;
    }
    .chat-output {
      align-self: flex-start; width: 100%;
      font: 13px/1.6 "Cascadia Code", "Fira Code", monospace;
      color: #abb2bf; white-space: pre-wrap; word-break: break-word;
    }
    .chat-thinking {
      align-self: flex-start; display: flex; gap: 5px; align-items: center;
      padding: 10px 14px; background: rgba(255,255,255,.04);
      border-radius: 12px 12px 12px 2px;
    }
    .chat-thinking span {
      width: 7px; height: 7px; border-radius: 50%; background: #555;
      animation: thinking-bounce 1.2s infinite;
    }
    .chat-thinking span:nth-child(2) { animation-delay: .2s; }
    .chat-thinking span:nth-child(3) { animation-delay: .4s; }
    @keyframes thinking-bounce {
      0%, 60%, 100% { opacity: .3; transform: translateY(0); }
      30%            { opacity: 1;  transform: translateY(-4px); }
    }
    #simple-input-bar {
      flex-shrink: 0; display: flex; align-items: flex-end; gap: 6px;
      padding: 8px max(10px, calc(50% - 400px));
      border-top: 1px solid #222; background: #111;
    }
    #simple-input {
      flex: 1; resize: none; overflow: hidden;
      background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
      padding: 7px 10px; font: 13px/1.4 monospace; color: #abb2bf;
      outline: none; min-height: 34px; max-height: 120px;
    }
    #simple-input:focus { border-color: #555; }
    #simple-input::placeholder { color: #3a3a3a; }
    #simple-send { flex-shrink: 0; height: 34px; }
  </style>
</head>
<body>
  <div id="header">
    <button class="btn muted" id="panel-toggle" title="Toggle panel">≡</button>
    <button class="btn muted" id="file-panel-toggle" title="Toggle file browser">⊞</button>
    <button class="btn muted" id="mode-toggle" title="Toggle simple/terminal view">simple</button>
<div id="status" class="disconnected">●</div>
    <span id="session-badge">resumed</span>
    <button class="btn accent" id="refresh-btn">refresh</button>
  </div>

  <div id="workspace">

    <!-- ── Management panel ── -->
    <div id="panel">

      <!-- Projects -->
      <div class="section-head">
        <span class="section-label">Projects</span>
        <button class="btn accent" id="new-session-btn" title="Open or create a project">+ new</button>
      </div>
      <div id="projects-list"></div>
      <div id="no-projects" style="display:none">No projects yet. Click + new to create one.</div>

      <div class="section-divider"></div>

      <!-- Conversations -->
      <div id="conversations-section">
        <div class="section-head">
          <span class="section-label">Conversations</span>
          <button class="btn accent" id="save-session-btn" title="Save current conversation to history">save</button>
        </div>
        <div id="search-wrap">
          <input id="search-input" type="text" placeholder="search conversations…" autocomplete="off">
        </div>
        <div id="sessions-list"></div>
        <div id="no-sessions">No saved conversations yet.<br>Click save or use refresh.</div>
      </div>

      <div id="panel-footer">
        <img id="user-avatar" alt="" title="">
        <a class="btn muted" id="admin-link" href="/admin" style="display:none">admin</a>
        <a class="btn muted" href="/logout">logout</a>
        <button class="btn danger" id="clear-all-btn">clear all</button>
      </div>
    </div>

    <!-- Terminal -->
    <div id="main">
      <div id="terminal-container"></div>
      <div id="simple-view">
        <div id="simple-chat"></div>
        <div id="simple-input-bar">
          <textarea id="simple-input" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"></textarea>
          <button class="btn accent" id="simple-send">Send</button>
        </div>
      </div>
    </div>

    <!-- File tree panel -->
    <div id="file-panel" class="collapsed">
      <div id="file-panel-head">
        <span class="section-label">Files</span>
        <button class="btn muted" id="file-refresh-btn" title="Refresh">↻</button>
        <button class="btn muted" id="file-expand-btn" title="Expand file browser">⤢</button>
      </div>
      <div id="file-tree">
        <div id="file-tree-empty">No active session.</div>
      </div>
      <div id="file-content-pane">
        <div id="file-content-header">
          <span id="file-content-name"></span>
          <span id="file-content-warning"></span>
          <button class="btn muted" id="file-content-close" style="padding:2px 6px;font-size:10px">✕</button>
        </div>
        <div id="file-content-body"></div>
      </div>
    </div>
  </div>

  <!-- Project picker modal -->
  <div id="project-modal" style="display:none">
    <div id="project-modal-box">
      <div id="project-modal-header">
        <h3>Open Project</h3>
        <button class="btn muted" id="project-modal-close">✕</button>
      </div>
      <input id="project-name-input" type="text" placeholder="Type a new project name, or pick one below…" autocomplete="off">
      <div id="project-dir-list"></div>
      <div id="project-modal-footer">
        <span id="project-modal-hint"></span>
        <button class="btn muted" id="project-cancel-btn">Cancel</button>
        <button class="btn accent" id="project-open-btn">Open</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  <script>
  // ── User info ──────────────────────────────────────────────────────────────
  fetch('/me').then(r => r.json()).then(u => {
    if (u.avatar) { const img = document.getElementById('user-avatar'); img.src = u.avatar; img.title = u.email; img.style.display = 'block'; }
    if (u.isAdmin) document.getElementById('admin-link').style.display = 'inline-block';
  }).catch(() => location = '/login');

  // ── Terminal ───────────────────────────────────────────────────────────────
  const term = new Terminal({
    fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", monospace',
    fontSize: 14, lineHeight: 1.2,
    theme: {
      background: '#1a1a1a', foreground: '#abb2bf', cursor: '#528bff', cursorAccent: '#1a1a1a',
      black: '#1e2127', red: '#e06c75', green: '#98c379', yellow: '#d19a66',
      blue: '#61afef', magenta: '#c678dd', cyan: '#56b6c2', white: '#abb2bf',
      brightBlack: '#5c6370', brightRed: '#e06c75', brightGreen: '#98c379',
      brightYellow: '#e5c07b', brightBlue: '#61afef', brightMagenta: '#c678dd',
      brightCyan: '#56b6c2', brightWhite: '#ffffff',
    },
    cursorBlink: true, scrollback: 5000, allowProposedApi: true,
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.open(document.getElementById('terminal-container'));
  fitAddon.fit();

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function relDate(ts) {
    const d = Date.now() - new Date(ts).getTime();
    const m = Math.floor(d / 60000);
    if (m < 1)  return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    const days = Math.floor(h / 24);
    if (days < 7) return `${days}d ago`;
    return new Date(ts).toLocaleDateString();
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let allSessions     = [];
  let allProjects     = [];
  let activeSessionId = null;
  let activeWorkDir   = null;
  let filterProjectPath = null;   // when set, conversations list is filtered to this project

  // ── Projects panel ─────────────────────────────────────────────────────────
  async function loadProjects() {
    try { allProjects = await fetch('/api/projects').then(r => r.json()); }
    catch (_) { allProjects = []; }
    renderProjects();
  }

  function renderProjects() {
    const list    = document.getElementById('projects-list');
    const empty   = document.getElementById('no-projects');
    list.innerHTML = '';
    if (!allProjects.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    allProjects.forEach(p => {
      const isActive   = activeWorkDir === p.path;
      const isFiltered = filterProjectPath === p.path && !isActive;
      const item       = document.createElement('div');
      item.className   = 'project-item'
        + (isActive   ? ' active-project' : '')
        + (isFiltered ? ' filtered'       : '');
      item.title = p.path;
      item.innerHTML = `
        <div class="project-item-info">
          <div class="project-item-name">${escHtml(p.name)}</div>
        </div>
        ${p.shared ? '<span class="project-shared-badge">shared</span>' : ''}
        <div class="project-item-age">${relDate(p.mtime)}</div>`;
      item.addEventListener('click', () => onProjectClick(p.path));
      list.appendChild(item);
    });
  }

  function onProjectClick(path) {
    // Toggle filter: clicking the same project again clears it
    filterProjectPath = filterProjectPath === path ? null : path;
    renderProjects();
    applySearch();
  }

  async function switchToProject(workDir) {
    if (workDir === activeWorkDir) return;
    await fetch('/api/sessions/save', { method: 'POST' }).catch(() => {});
    filterProjectPath = null;
    startNewSession({ workDir });
  }

  // ── Conversations panel ────────────────────────────────────────────────────
  async function loadSessions() {
    try {
      allSessions = await fetch('/api/sessions').then(r => r.json());
      applySearch();
    } catch (_) {}
  }

  function applySearch() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    let filtered = allSessions;
    if (filterProjectPath) filtered = filtered.filter(s => s.workDir === filterProjectPath);
    if (q) filtered = filtered.filter(s => s.title?.toLowerCase().includes(q) || s.snippet?.toLowerCase().includes(q));
    renderSessions(filtered);

    // Update conversations section label to reflect active filter
    const label = document.querySelector('#conversations-section .section-label');
    label.textContent = filterProjectPath
      ? `Conversations — ${filterProjectPath.split('/').pop()}`
      : 'Conversations';
  }

  function renderSessions(sessions) {
    const list  = document.getElementById('sessions-list');
    const empty = document.getElementById('no-sessions');
    list.innerHTML = '';
    if (!sessions.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    sessions.forEach(s => {
      const isActive  = s.id === activeSessionId;
      const item      = document.createElement('div');
      item.className  = 'session-item' + (isActive ? ' active-session' : '');
      item.dataset.id = s.id;
      const projectName = s.workDir ? s.workDir.split('/').pop() : null;
      item.innerHTML = `
        <div class="session-meta">
          <div class="session-title-wrap">
            <div class="session-title" title="${escHtml(s.title)}">${escHtml(s.title)}</div>
          </div>
          <div class="session-byline">
            <span>${relDate(s.timestamp)}</span>
            ${projectName ? `<span class="session-project-tag" title="${escHtml(s.workDir || '')}">${escHtml(projectName)}</span>` : ''}
          </div>
          ${s.snippet ? `<div class="session-snippet">${escHtml(s.snippet)}</div>` : ''}
        </div>
        <div class="session-actions">
          <button class="session-action-btn rename" title="Rename">✎</button>
          <button class="session-action-btn delete" title="Delete">✕</button>
        </div>`;
      item.querySelector('.session-action-btn.rename').addEventListener('click', e => {
        e.stopPropagation(); startRename(s.id, item);
      });
      item.querySelector('.session-action-btn.delete').addEventListener('click', e => {
        e.stopPropagation(); deleteSession(s.id);
      });
      item.addEventListener('click', () => resumeSession(s.id));
      list.appendChild(item);
    });
  }

  async function resumeSession(id) {
    if (id === activeSessionId) return;
    if (!confirm('Switch to this conversation? Your current session will be saved first.')) return;
    await fetch('/api/sessions/save', { method: 'POST' }).catch(() => {});
    filterProjectPath = null;
    activeSessionId = id;
    await fetch(`/api/sessions/${id}/resume`, { method: 'POST' });
  }

  async function saveCurrentSession() {
    const btn = document.getElementById('save-session-btn');
    btn.disabled = true; btn.textContent = 'saving…';
    try {
      await fetch('/api/sessions/save', { method: 'POST' });
      await loadSessions();
    } finally { btn.disabled = false; btn.textContent = 'save'; }
  }

  function startRename(id, item) {
    const titleEl    = item.querySelector('.session-title');
    const currentTitle = titleEl.textContent;
    const input      = document.createElement('input');
    input.type = 'text'; input.value = currentTitle; input.className = 'session-title-input';
    titleEl.replaceWith(input);
    input.focus(); input.select();

    async function finishRename() {
      const newTitle = input.value.trim() || currentTitle;
      const entry    = allSessions.find(s => s.id === id);
      if (entry) entry.title = newTitle;
      applySearch();
      if (newTitle !== currentTitle) {
        await fetch(`/api/sessions/${id}`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: newTitle }),
        });
      }
    }
    input.addEventListener('blur', finishRename, { once: true });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = currentTitle; input.blur(); }
    });
  }

  async function deleteSession(id) {
    allSessions = allSessions.filter(s => s.id !== id);
    applySearch();
    await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
  }

  async function clearAllSessions() {
    if (!confirm('Delete all saved conversations? This cannot be undone.')) return;
    allSessions = [];
    applySearch();
    await fetch('/api/sessions', { method: 'DELETE' });
  }

  // ── Panel toggle ───────────────────────────────────────────────────────────
  const panel      = document.getElementById('panel');
  const panelToggle = document.getElementById('panel-toggle');

  let fileWasExpanded = false;
  panelToggle.addEventListener('click', () => {
    const opening = panel.classList.contains('collapsed');
    if (opening) {
      // Opening sidebar — remember and exit full-screen if active
      fileWasExpanded = workspace.classList.contains('file-expanded');
      if (fileWasExpanded) {
        workspace.classList.remove('file-expanded');
        fileExpandBtn.textContent = '⤢';
        fileExpandBtn.title = 'Expand file browser';
      }
    } else {
      // Closing sidebar — restore full-screen if it was active before
      if (fileWasExpanded) {
        workspace.classList.add('file-expanded');
        fileExpandBtn.textContent = '⤡';
        fileExpandBtn.title = 'Collapse file browser';
      }
    }
    panel.classList.toggle('collapsed');
    panelToggle.classList.toggle('active-btn', !panel.classList.contains('collapsed'));
    if (!simpleMode) { fitAddon.fit(); sendResize(); }
  });

  // ── Panel event listeners ──────────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', applySearch);
  document.getElementById('save-session-btn').addEventListener('click', saveCurrentSession);
  document.getElementById('clear-all-btn').addEventListener('click', clearAllSessions);
  document.getElementById('new-session-btn').addEventListener('click', openProjectModal);

  // ── WebSocket ──────────────────────────────────────────────────────────────
  const statusEl = document.getElementById('status');
  const badgeEl  = document.getElementById('session-badge');
  let ws;

  function sendResize() {
    if (ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.addEventListener('open', () => {
      statusEl.textContent = '●'; statusEl.className = 'connected';
      sendResize();
    });

    ws.addEventListener('message', ev => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'output') {
        term.write(msg.data);
        appendSimpleOutput(msg.data);
      } else if (msg.type === 'meta') {
        badgeEl.className = msg.resumed ? 'resumed' : '';
        if (msg.sessionId) activeSessionId = msg.sessionId;
        if (msg.workDir)   { activeWorkDir = msg.workDir; renderProjects(); if (!filePanel.classList.contains('collapsed')) { expandedDirs.clear(); renderTree(); } }
        if (msg.restarted) {
          term.clear(); setRefreshState(false);
          simpleLines = []; simpleCurrentLine = ''; simpleCurrentOutputEl = null; simpleThinkingEl = null;
          document.getElementById('simple-chat').innerHTML = '';
          loadSessions(); loadProjects();
        }
      } else if (msg.type === 'exit') {
        term.write('\r\n\x1b[33m[claude exited]\x1b[0m\r\n');
        statusEl.textContent = '●'; statusEl.className = 'disconnected';
        badgeEl.className = '';
      }
    });

    ws.addEventListener('close', () => {
      statusEl.textContent = '●'; statusEl.className = 'disconnected';
      setTimeout(connect, 3000);
    });

    ws.addEventListener('error', () => ws.close());
  }

  term.onData(data => {
    if (ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'input', data }));
  });

  // ── Header buttons ─────────────────────────────────────────────────────────
  const refreshBtn = document.getElementById('refresh-btn');
  function setRefreshState(loading) {
    refreshBtn.disabled = loading;
    refreshBtn.textContent = loading ? 'refreshing…' : 'refresh';
    refreshBtn.style.opacity = loading ? '.5' : '';
  }
  refreshBtn.addEventListener('click', () => {
    if (!confirm('Compact the conversation into memory then restart with a fresh context window?')) return;
    setRefreshState(true);
    fetch('/session/refresh', { method: 'POST' }).catch(() => setRefreshState(false));
  });

  // ── Project picker modal ───────────────────────────────────────────────────
  let modalProjects  = [];
  let selectedProject = null;

  async function openProjectModal() {
    selectedProject = null;
    document.getElementById('project-name-input').value = '';
    document.getElementById('project-modal').style.display = 'flex';
    document.getElementById('project-name-input').focus();
    try { modalProjects = await fetch('/api/projects').then(r => r.json()); }
    catch (_) { modalProjects = []; }
    renderModalProjectList('');
  }

  function closeProjectModal() {
    document.getElementById('project-modal').style.display = 'none';
  }

  function renderModalProjectList(filter) {
    const list  = document.getElementById('project-dir-list');
    const q     = filter.toLowerCase();
    const shown = q ? modalProjects.filter(p => p.name.toLowerCase().includes(q)) : modalProjects;
    list.innerHTML = '';
    if (!shown.length) {
      list.innerHTML = `<div id="project-no-results">${q ? `No projects matching "${escHtml(q)}" — press Enter to create it.` : 'No projects yet.'}</div>`;
      document.getElementById('project-modal-hint').textContent = '';
      return;
    }
    shown.forEach(p => {
      const item      = document.createElement('div');
      const shortPath = p.path.replace(/^\/home\/[^/]+/, '~');
      item.className  = 'project-dir-item' + (selectedProject?.path === p.path ? ' selected' : '');
      item.innerHTML  = `
        <div class="dir-name">${escHtml(p.name)}${p.shared ? ' <span class="dir-shared-badge">shared</span>' : ''}</div>
        <div class="dir-path">${escHtml(shortPath)}</div>`;
      item.addEventListener('click', () => {
        selectedProject = p;
        document.getElementById('project-name-input').value = p.name;
        renderModalProjectList(filter); updateModalHint();
      });
      list.appendChild(item);
    });
    updateModalHint();
  }

  function updateModalHint() {
    const hint  = document.getElementById('project-modal-hint');
    const input = document.getElementById('project-name-input').value.trim();
    if (selectedProject?.shared) hint.textContent = 'Opens shared project';
    else if (selectedProject)    hint.textContent = 'Opens existing project';
    else if (input)              hint.textContent = `Creates …/Claude_Projects/…/${input}`;
    else                         hint.textContent = 'Leave blank for an unnamed session';
  }

  function confirmProject() {
    const inputVal = document.getElementById('project-name-input').value.trim();
    if (selectedProject) startNewSession({ workDir: selectedProject.path });
    else                 startNewSession({ projectName: inputVal || undefined });
    closeProjectModal();
  }

  function startNewSession({ workDir, projectName } = {}) {
    term.clear(); badgeEl.className = '';
    fetch('/session/reset', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ workDir, projectName }),
    });
  }

  document.getElementById('project-name-input').addEventListener('input', e => {
    selectedProject = null; renderModalProjectList(e.target.value); updateModalHint();
  });
  document.getElementById('project-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmProject();
    if (e.key === 'Escape') closeProjectModal();
  });
  document.getElementById('project-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('project-modal')) closeProjectModal();
  });
  document.getElementById('project-modal-close').addEventListener('click', closeProjectModal);
  document.getElementById('project-cancel-btn').addEventListener('click', closeProjectModal);
  document.getElementById('project-open-btn').addEventListener('click', confirmProject);

  // ── File tree ──────────────────────────────────────────────────────────────
  const filePanel       = document.getElementById('file-panel');
  const filePanelToggle = document.getElementById('file-panel-toggle');
  const fileTree        = document.getElementById('file-tree');
  const fileTreeEmpty   = document.getElementById('file-tree-empty');
  let fileTreeRoot      = null;   // current workDir being browsed
  let expandedDirs      = new Set();
  let fileRefreshTimer  = null;

  filePanelToggle.addEventListener('click', () => {
    const open = filePanel.classList.toggle('collapsed');
    filePanelToggle.classList.toggle('active-btn', !filePanel.classList.contains('collapsed'));
    if (!simpleMode) { fitAddon.fit(); sendResize(); }
    if (!filePanel.classList.contains('collapsed')) {
      if (activeWorkDir) renderTree();
      startFileAutoRefresh();
    } else {
      stopFileAutoRefresh();
    }
  });

  document.getElementById('file-refresh-btn').addEventListener('click', renderTree);

  const fileExpandBtn = document.getElementById('file-expand-btn');
  const workspace     = document.getElementById('workspace');
  fileExpandBtn.addEventListener('click', () => {
    const expanded = workspace.classList.toggle('file-expanded');
    fileExpandBtn.textContent = expanded ? '⤡' : '⤢';
    fileExpandBtn.title = expanded ? 'Collapse file browser' : 'Expand file browser';
    if (!expanded && !simpleMode) { fitAddon.fit(); sendResize(); }
  });

  function startFileAutoRefresh() {
    stopFileAutoRefresh();
    fileRefreshTimer = setInterval(() => { if (activeWorkDir) renderTree(); }, 15000);
  }
  function stopFileAutoRefresh() {
    clearInterval(fileRefreshTimer); fileRefreshTimer = null;
  }

  async function fetchDir(dir) {
    const r = await fetch(`/api/filetree?path=${encodeURIComponent(dir)}`);
    if (!r.ok) throw new Error((await r.json()).error);
    return (await r.json()).entries;
  }

  async function renderTree() {
    if (!activeWorkDir) return;
    fileTreeRoot = activeWorkDir;
    fileTreeEmpty.style.display = 'none';
    fileTree.innerHTML = '';
    fileTree.appendChild(fileTreeEmpty);
    try {
      const entries = await fetchDir(fileTreeRoot);
      if (!entries.length) { fileTreeEmpty.textContent = 'Project is empty.'; fileTreeEmpty.style.display = 'block'; return; }
      for (const entry of entries) {
        fileTree.insertBefore(buildNode(entry, 0), fileTreeEmpty);
      }
    } catch (e) {
      fileTreeEmpty.textContent = `Error: ${e.message}`; fileTreeEmpty.style.display = 'block';
    }
  }

  function buildNode(entry, depth) {
    const node = document.createElement('div');
    node.className = 'tree-node';

    const row = document.createElement('div');
    const isDotfile = entry.name.startsWith('.');
    row.className = 'tree-row ' + (entry.type === 'dir' ? 'tree-dir' : 'tree-file');
    row.innerHTML = `
      <span class="tree-icon">${entry.type === 'dir' ? (expandedDirs.has(entry.path) ? '▾' : '▸') : ''}</span>
      <span class="tree-name${isDotfile ? ' dotfile' : ''}">${escHtml(entry.name)}</span>`;
    node.appendChild(row);

    if (entry.type === 'dir') {
      const children = document.createElement('div');
      children.className = 'tree-children';
      children.style.display = expandedDirs.has(entry.path) ? 'block' : 'none';
      node.appendChild(children);

      if (expandedDirs.has(entry.path)) loadChildren(entry.path, children);

      row.addEventListener('click', async () => {
        const open = expandedDirs.has(entry.path);
        if (open) {
          expandedDirs.delete(entry.path);
          children.style.display = 'none';
          row.querySelector('.tree-icon').textContent = '▸';
        } else {
          expandedDirs.add(entry.path);
          children.style.display = 'block';
          row.querySelector('.tree-icon').textContent = '▾';
          loadChildren(entry.path, children);
        }
      });
    } else {
      row.addEventListener('click', () => openFile(entry.path));
    }

    return node;
  }

  async function loadChildren(dir, container) {
    container.innerHTML = '<div class="tree-loading">loading…</div>';
    try {
      const entries = await fetchDir(dir);
      container.innerHTML = '';
      if (!entries.length) {
        container.innerHTML = '<div class="tree-loading">empty</div>';
      } else {
        entries.forEach(e => container.appendChild(buildNode(e, 0)));
      }
    } catch (e) {
      container.innerHTML = `<div class="tree-loading">error: ${escHtml(e.message)}</div>`;
    }
  }

  const fileContentPane = document.getElementById('file-content-pane');

  function closeFilePane() {
    fileContentPane.classList.remove('open');
    document.getElementById('file-tree').classList.remove('split');
  }

  function stripAnsi(s) {
    return s.replace(/\x1b\[[0-9;]*[mGKHF]/g, '');
  }

  function renderNotebook(content) {
    const body = document.getElementById('file-content-body');
    body.classList.add('notebook');
    body.innerHTML = '';
    let nb;
    try { nb = JSON.parse(content); } catch { body.textContent = 'Invalid notebook JSON.'; return; }
    const cells = nb.cells || nb.worksheets?.[0]?.cells || [];

    for (const cell of cells) {
      const source = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');
      const cellEl = document.createElement('div');
      cellEl.className = `nb-cell nb-cell-${cell.cell_type}`;

      // Input row
      const inRow = document.createElement('div');
      inRow.className = 'nb-cell-in';

      const gutter = document.createElement('div');
      gutter.className = 'nb-gutter';
      if (cell.cell_type === 'code') {
        const n = cell.execution_count;
        gutter.textContent = n != null ? `[${n}]:` : '[ ]:';
      }

      const src = document.createElement('div');
      src.className = 'nb-source';
      if (cell.cell_type === 'markdown' && typeof marked !== 'undefined') {
        src.innerHTML = marked.parse(source);
      } else {
        src.textContent = source;
      }

      inRow.appendChild(gutter);
      inRow.appendChild(src);
      cellEl.appendChild(inRow);

      // Outputs (code cells only)
      const outputs = cell.outputs || [];
      if (outputs.length) {
        const outsEl = document.createElement('div');
        outsEl.className = 'nb-outputs';

        for (const out of outputs) {
          const outEl = document.createElement('div');
          outEl.className = 'nb-output';

          if (out.output_type === 'stream') {
            const text = Array.isArray(out.text) ? out.text.join('') : (out.text || '');
            const pre = document.createElement('pre');
            pre.className = `nb-output-text${out.name === 'stderr' ? ' stderr' : ''}`;
            pre.textContent = text;
            outEl.appendChild(pre);

          } else if (out.output_type === 'display_data' || out.output_type === 'execute_result') {
            const data = out.data || {};
            if (data['image/png']) {
              const img = document.createElement('img');
              img.src = `data:image/png;base64,${data['image/png'].replace(/\n/g, '')}`;
              outEl.appendChild(img);
            } else if (data['image/jpeg']) {
              const img = document.createElement('img');
              img.src = `data:image/jpeg;base64,${data['image/jpeg'].replace(/\n/g, '')}`;
              outEl.appendChild(img);
            } else if (data['image/svg+xml']) {
              const svg = Array.isArray(data['image/svg+xml']) ? data['image/svg+xml'].join('') : data['image/svg+xml'];
              const div = document.createElement('div');
              div.style.cssText = 'max-width:100%;overflow:auto';
              div.innerHTML = svg;
              outEl.appendChild(div);
            } else if (data['text/plain']) {
              const text = Array.isArray(data['text/plain']) ? data['text/plain'].join('') : data['text/plain'];
              const pre = document.createElement('pre');
              pre.className = 'nb-output-result';
              pre.textContent = text;
              if (out.output_type === 'execute_result') {
                const outGutter = document.createElement('div');
                outGutter.style.cssText = 'font:9px/1 monospace;color:#3e4452;padding:4px 6px 0 0;min-width:46px;text-align:right;float:left';
                const n = out.execution_count;
                outGutter.textContent = n != null ? `[${n}]:` : '[ ]:';
                outEl.appendChild(outGutter);
              }
              outEl.appendChild(pre);
            }

          } else if (out.output_type === 'error') {
            const tb = (out.traceback || []).map(stripAnsi).join('\n');
            const pre = document.createElement('pre');
            pre.className = 'nb-output-error';
            pre.textContent = tb || `${out.ename}: ${out.evalue}`;
            outEl.appendChild(pre);
          }

          outsEl.appendChild(outEl);
        }
        cellEl.appendChild(outsEl);
      }

      body.appendChild(cellEl);
    }
  }

  async function openFile(filePath) {
    const name = filePath.split('/').pop();
    const body = document.getElementById('file-content-body');
    document.getElementById('file-content-name').textContent = name;
    document.getElementById('file-content-name').title = filePath.replace(/^\/home\/[^/]+/, '~');
    document.getElementById('file-content-warning').textContent = '';
    body.classList.remove('notebook');
    body.innerHTML = '';
    body.textContent = 'Loading…';
    fileContentPane.classList.add('open');
    document.getElementById('file-tree').classList.add('split');
    try {
      const r    = await fetch(`/api/file?path=${encodeURIComponent(filePath)}`);
      const data = await r.json();
      if (!r.ok) throw new Error(data.error);
      if (name.endsWith('.ipynb')) {
        renderNotebook(data.content);
      } else {
        body.textContent = data.content;
      }
      if (data.truncated) {
        const mb = (data.size / 1024 / 1024).toFixed(1);
        document.getElementById('file-content-warning').textContent = `truncated (${mb} MB)`;
      }
    } catch (e) {
      body.classList.remove('notebook');
      body.textContent = `Error: ${e.message}`;
    }
  }

  document.getElementById('file-content-close').addEventListener('click', closeFilePane);

  // ── Resize ─────────────────────────────────────────────────────────────────
  new ResizeObserver(() => { if (!simpleMode) { fitAddon.fit(); sendResize(); } })
    .observe(document.getElementById('terminal-container'));
  window.addEventListener('resize', () => { if (!simpleMode) { fitAddon.fit(); sendResize(); } });

  // ── Simple / terminal mode toggle ─────────────────────────────────────────
  let simpleMode = localStorage.getItem('uiMode') === 'simple';
  let simpleLines = [];
  let simpleCurrentLine = '';
  let simpleCurrentOutputEl = null;
  let simpleThinkingEl = null;
  const mainEl  = document.getElementById('main');
  const modeTgl = document.getElementById('mode-toggle');

  function applyMode() {
    mainEl.classList.toggle('simple-mode', simpleMode);
    modeTgl.classList.toggle('active-btn', simpleMode);
    modeTgl.textContent = simpleMode ? 'terminal' : 'simple';
    if (!simpleMode) { fitAddon.fit(); sendResize(); }
  }

  modeTgl.addEventListener('click', () => {
    simpleMode = !simpleMode;
    localStorage.setItem('uiMode', simpleMode ? 'simple' : 'full');
    applyMode();
  });

  function stripAnsi(str) {
    return str
      .replace(/\x1b\[[0-9;?]*[a-zA-Z]/g, '')    // CSI sequences (colors, cursor moves)
      .replace(/\x1b\][^\x07]*\x07/g, '')          // OSC sequences ending with BEL
      .replace(/\x1b\][^\x1b]*\x1b\\/g, '')        // OSC sequences ending with ST
      .replace(/\x1b./g, '');                       // other 2-char ESC sequences
  }

  function getOrCreateOutputEl() {
    if (!simpleCurrentOutputEl) {
      simpleCurrentOutputEl = document.createElement('div');
      simpleCurrentOutputEl.className = 'chat-output';
      document.getElementById('simple-chat').appendChild(simpleCurrentOutputEl);
    }
    return simpleCurrentOutputEl;
  }

  function appendSimpleOutput(raw) {
    const stripped = stripAnsi(raw);
    let i = 0;
    while (i < stripped.length) {
      const ch = stripped[i];
      if (ch === '\r' && stripped[i + 1] === '\n') {
        simpleLines.push(simpleCurrentLine);
        simpleCurrentLine = '';
        i += 2;
      } else if (ch === '\n') {
        simpleLines.push(simpleCurrentLine);
        simpleCurrentLine = '';
        i++;
      } else if (ch === '\r') {
        i++; // ignore bare \r — line-overwrite is a terminal concept, not chat
      } else if (ch < ' ' && ch !== '\t') {
        i++;
      } else {
        simpleCurrentLine += ch;
        i++;
      }
    }
    const content = [...simpleLines, simpleCurrentLine].join('').trim();
    if (simpleThinkingEl && content.length > 0) {
      simpleThinkingEl.remove();
      simpleThinkingEl = null;
    }
    const el   = getOrCreateOutputEl();
    const chat = document.getElementById('simple-chat');
    const atBottom = chat.scrollHeight - chat.scrollTop <= chat.clientHeight + 60;
    el.textContent = [...simpleLines, simpleCurrentLine].join('\n');
    if (atBottom) chat.scrollTop = chat.scrollHeight;
  }

  function sendSimpleInput() {
    const inp  = document.getElementById('simple-input');
    const text = inp.value;
    if (!text) return;

    // Seal current output block, add user bubble, show thinking indicator
    simpleLines = []; simpleCurrentLine = ''; simpleCurrentOutputEl = null;
    const chat = document.getElementById('simple-chat');
    const bubble = document.createElement('div');
    bubble.className = 'chat-user';
    bubble.textContent = text;
    chat.appendChild(bubble);
    simpleThinkingEl = document.createElement('div');
    simpleThinkingEl.className = 'chat-thinking';
    simpleThinkingEl.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(simpleThinkingEl);
    chat.scrollTop = chat.scrollHeight;

    if (ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'input', data: text + '\r' }));
    inp.value = '';
    inp.style.height = '';
  }

  const simpleInputEl = document.getElementById('simple-input');
  simpleInputEl.addEventListener('input', function() {
    this.style.height = '';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  simpleInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendSimpleInput(); }
  });
  document.getElementById('simple-send').addEventListener('click', sendSimpleInput);

  applyMode();

  // ── Init ───────────────────────────────────────────────────────────────────
  loadProjects();
  loadSessions();
  connect();
  </script>
</body>
</html>
