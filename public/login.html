<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #abb2bf;
    }
    .card {
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
    }
    .logo {
      font-family: monospace;
      font-size: 22px;
      font-weight: bold;
      color: #e06c75;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 13px;
      color: #555;
      margin-bottom: 40px;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 20px;
      background: #fff;
      color: #3c4043;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .google-btn:hover {
      background: #f5f5f5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .google-btn svg { flex-shrink: 0; }
    .error {
      margin-top: 24px;
      padding: 10px 14px;
      background: rgba(224, 108, 117, 0.12);
      border: 1px solid rgba(224, 108, 117, 0.3);
      border-radius: 6px;
      font-size: 13px;
      color: #e06c75;
    }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Claude Code</div>
    <div class="tagline">Web Terminal</div>

    <a class="google-btn" href="/auth/google">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Sign in with Google
    </a>

    <div id="error-box" style="display:none" class="error"></div>

    <div class="footer">Access is restricted to approved accounts.</div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('error') === 'not_whitelisted') {
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.textContent = 'Your Google account is not approved. Contact the administrator.';
    }
  </script>
</body>
</html>
